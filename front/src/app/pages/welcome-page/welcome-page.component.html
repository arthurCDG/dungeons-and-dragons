<div class="container">
	<div class="home-text">
		<h1 class="home-title">Dungeons and Dragons</h1>

		@if (sessionStore.isAuthenticated()) {
			<a [routerLink]="sessionStore.playersRoute()" class="link-button base-button nav-button welcome-link">
				Mes joueurs
			</a>
		}
		@else {
			<a [routerLink]="['/login']" class="link-button base-button nav-button welcome-link">
				Démarrer l'aventure
			</a>
		}
	</div>
</div>
