<app-page-background-image [image]="adventureStore.backgroundImage()" />

@if (adventureStore.isLoading()) {
	<app-loading-spinner />
}

@else {
	<app-page-wrapper>
		<app-adventure-log />
		<div id="board-wrapper">
			<div class="board">
				@for (square of adventureStore.squares(); track square.id) {
					<app-square [square]="square" />
				}
			</div>

			<app-action-bar />
		</div>
	</app-page-wrapper>
}
